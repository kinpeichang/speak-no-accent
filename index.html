<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accent Master 🏆</title>
    <style>
        /* All your styles here */
        body { font-family: 'Inter', sans-serif; background: #1e3c72; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); }
        #wordDisplay { font-size: 4rem; margin: 20px 0; }
        button { padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin: 10px; }
        #recordBtn { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <h1>Accent Master 🏆</h1>
    <div class="container">
        <div id="streakDisplay">High Score: 0 ⚡</div>
        <h2 id="wordDisplay">Loading...</h2>
        <button onclick="speakWord()" style="background: #3498db; color: white;">🔊 Listen</button>
        <button id="recordBtn" onclick="startListening()">🎤 Record</button>
        <p id="feedback">Ready!</p>
    </div>

    <audio id="tacoSound" src="https://actions.google.com/sounds/v1/impacts/crash_metal.ogg"></audio>

    <script>
        let currentWord = "", currentStreak = 0;
        let highScore = localStorage.getItem('highScore') || 0; // 💾 Load high score
        document.getElementById('streakDisplay').innerText = `High Score: ${highScore} ⚡`;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        async function fetchNewWord() {
            const response = await fetch('https://random-word-api.herokuapp.com/word');
            const data = await response.json();
            currentWord = data[0];
            document.getElementById('wordDisplay').innerText = currentWord;
        }

        function speakWord() {
            const msg = new SpeechSynthesisUtterance(currentWord);
            const voices = window.speechSynthesis.getVoices();
            // 👩‍💼 Find Female Australian voice
            msg.voice = voices.find(v => v.lang.includes('en-AU') && (v.name.includes('Female') || v.name.includes('Catherine') || v.name.includes('Karen')));
            window.speechSynthesis.speak(msg);
        }

        function startListening() { recognition.start(); }

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase();
            if (transcript === currentWord.toLowerCase()) {
                document.getElementById('tacoSound').play(); // 🔔 Bong!
                currentStreak++;
                if (currentStreak > highScore) {
                    highScore = currentStreak;
                    localStorage.setItem('highScore', highScore); // 💾 Save high score
                }
                document.getElementById('streakDisplay').innerText = `High Score: ${highScore} ⚡`;
                fetchNewWord();
            }
        };

        fetchNewWord(); // Initial word
    </script>
</body>
</html>
