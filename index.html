<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accent Master v11</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: #1e3c72; color: white; }
        .sidebar { width: 280px; background: rgba(255,255,255,0.1); padding: 25px; border-right: 1px solid rgba(255,255,255,0.2); display: flex; flex-direction: column; gap: 20px; }
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #wordDisplay { font-size: 4rem; margin-bottom: 20px; }
        button { padding: 12px 25px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        input { padding: 10px; border-radius: 20px; border: none; width: 200px; margin-right: 10px; }
        #progressBar { width: 100%; max-width: 500px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; margin: 20px 0; overflow: hidden; }
        #progressFill { width: 0%; height: 100%; background: #3498db; transition: 0.3s; }
        .history-item { background: rgba(255,255,255,0.1); padding: 8px; margin-top: 5px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Stats 📊</h2>
        <div id="streakDisplay">Streak: 0 ⚡</div>
        <div id="scoreDisplay">Last Score: 0%</div>
        <div style="flex:1; overflow-y:auto;">
            <strong>History 📜</strong>
            <div id="historyLog"></div>
        </div>
    </div>

    <div class="main-content">
        <h1 id="wordDisplay">Hello</h1>
        <div>
            <button onclick="speakWord()" style="background: #3498db; color: white;">🔊 Listen</button>
            <button onclick="startListening()" style="background: #e74c3c; color: white;">🎤 Record</button>
        </div>
        
        <div id="progressBar"><div id="progressFill"></div></div>
        <p id="feedback">Ready!</p>

        <div style="margin-top: 20px;">
            <input type="text" id="userWordInput" placeholder="Type a custom word...">
            <button onclick="setCustomWord()" style="background: #2ecc71; color: white;">Set Word</button>
        </div>
        <button onclick="setRandomWord()" style="background: #f1c40f; margin-top: 10px;">🎲 Random Word</button>
    </div>

    <script>
        let currentWord = "Hello", currentStreak = 0, attemptCount = 0;
        const wordBank = ["Schedule", "Library", "Specific", "February"];
        const recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();

        function getAussieVoice() {
            return window.speechSynthesis.getVoices().find(v => v.lang === 'en-AU' || v.name.includes("Australia"));
        }

        function speakWord() {
            const msg = new SpeechSynthesisUtterance(currentWord);
            msg.voice = getAussieVoice();
            msg.rate = (attemptCount >= 4) ? 0.5 : 0.9;
            window.speechSynthesis.speak(msg);
        }

        function setCustomWord() {
            const input = document.getElementById('userWordInput');
            const newWord = input.value.trim();
            if (newWord !== "") {
                currentWord = newWord;
                document.getElementById('wordDisplay').innerText = currentWord;
                attemptCount = 0;
                input.value = "";
            }
        }

        function setRandomWord() {
            currentWord = wordBank[Math.floor(Math.random() * wordBank.length)];
            document.getElementById('wordDisplay').innerText = currentWord;
            attemptCount = 0;
        }

        function startListening() { recognition.start(); }

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase();
            const isCorrect = transcript === currentWord.toLowerCase();
            updateUI(isCorrect);
        };

        function updateUI(isCorrect) {
            const score = isCorrect ? 100 : 0;
            document.getElementById('scoreDisplay').innerText = `Last Score: ${score}%`;
            document.getElementById('progressFill').style.width = `${score}%`;
            
            if (isCorrect) {
                currentStreak++;
                setTimeout(setRandomWord, 1000);
            } else {
                currentStreak = 0;
                attemptCount++;
            }
            document.getElementById('streakDisplay').innerText = `Streak: ${currentStreak} ⚡`;
            
            const log = document.getElementById('historyLog');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = `${currentWord}: ${score}%`;
            log.prepend(item);
            if (log.children.length > 10) log.removeChild(log.lastElementChild);
        }
    </script>
</body>
</html>
