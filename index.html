<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accent Master v5</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: #1e3c72; color: white; }
        .sidebar { width: 280px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 25px; border-right: 1px solid rgba(255,255,255,0.2); }
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #progressBar { width: 100%; max-width: 500px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; margin: 20px 0; }
        
        /* 🐢 1. Slowed down the bar by 50% (0.3s -> 0.45s) */
        #progressFill { width: 0%; height: 100%; transition: width 0.45s ease-in-out, background-color 0.45s ease; }
        
        .history-item { background: rgba(255,255,255,0.05); padding: 8px; margin-bottom: 5px; border-radius: 4px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Practice Log 📜</h2>
        <div id="historyList"></div> </div>

    <div class="main-content">
        <h1 id="wordDisplay">Hello</h1>
        <button onclick="speakWord()">🔊 Listen</button>
        <button onclick="startListening()">🎤 Record</button>
        <div id="progressBar"><div id="progressFill"></div></div>
        <p id="feedback">Ready!</p>
        <div style="margin-top: 20px;">
            <button onclick="setRandomWord()">🎲 Random Word</button>
        </div>
    </div>

    <audio id="dingSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
    <audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/clink_glasses.ogg"></audio>

    <script>
        let currentWord = "Hello", attemptCount = 0;
        const wordBank = ["Schedule", "Library", "Phenomenon", "Rural", "Sixth"];
        const recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();

        function speakWord() {
            const msg = new SpeechSynthesisUtterance(currentWord);
            msg.rate = (attemptCount >= 4) ? 0.5 : 1.0;
            window.speechSynthesis.speak(msg);
        }

        function startListening() { recognition.start(); }

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase();
            const score = (transcript === currentWord.toLowerCase()) ? 1.0 : 0.5;
            updateUI(transcript, score);
        };

        function updateUI(transcript, score) {
            const percentage = Math.round(score * 100); // 3. Score to 100%
            const fill = document.getElementById('progressFill');
            fill.style.width = percentage + "%";

            if (percentage >= 80) {
                if (percentage === 100) {
                    document.getElementById('dingSound').play(); // 4. Ding for 100%
                } else {
                    document.getElementById('successSound').play();
                }
                setTimeout(setRandomWord, 200);
                attemptCount = 0;
            } else {
                attemptCount++;
            }

            // 2. Add to History Log
            const log = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<b>${currentWord}</b>: ${percentage}%`;
            log.prepend(item);
        }

        function setRandomWord() {
            currentWord = wordBank[Math.floor(Math.random() * wordBank.length)];
            document.getElementById('wordDisplay').innerText = currentWord;
            document.getElementById('progressFill').style.width = "0%";
        }
    </script>
</body>
</html>
