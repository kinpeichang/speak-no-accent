<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accent Master v14</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; height: 100vh; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white; overflow: hidden;
        }
        .sidebar { 
            width: 280px; background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px; display: flex; flex-direction: column; gap: 20px; 
        }
        .stat-box { 
            background: rgba(255, 255, 255, 0.05); padding: 15px; 
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 📜 Scrollable History Container */
        .history-container {
            flex: 1; 
            overflow-y: auto; 
            margin-top: 10px;
            padding-right: 5px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .history-container::-webkit-scrollbar { width: 5px; }
        .history-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #wordDisplay { font-size: 4rem; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        button { padding: 12px 25px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.2s; margin: 5px; }
        #recordBtn { background: #e74c3c; color: white; }
        #progressBar { width: 100%; max-width: 500px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; margin: 30px 0; overflow: hidden; }
        #progressFill { width: 0%; height: 100%; transition: width 0.3s ease; background: #2ecc71; }
        .history-item { background: rgba(255,255,255,0.1); padding: 8px; margin-top: 5px; border-radius: 5px; font-size: 0.85rem; }
        input { padding: 10px; border-radius: 20px; border: 1px solid #ccc; width: 180px; color: #333; outline: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Accent Master 🏆</h2>
        <div class="stat-box">Streak: <span id="streakDisplay">0</span> ⚡</div>
        <div class="stat-box">Last Score: <span id="scoreDisplay">0%</span></div>
        
        <div class="history-container">
            <strong>Try History 📜</strong>
            <div id="historyLog"></div>
        </div>

        <div style="margin-top: auto;">
            <input type="text" id="userWordInput" placeholder="Set custom word...">
            <button onclick="setCustomWord()" style="background: white; color: #1e3c72; width: 100%; margin-top: 10px;">Set Word</button>
        </div>
    </div>

    <div class="main-content">
        <h1 id="wordDisplay">Hello</h1>
        <div>
            <button onclick="speakWord()" style="background: #3498db; color: white;">🔊 Listen</button>
            <button id="recordBtn" onclick="startListening()">🎤 Record</button>
        </div>
        <div id="progressBar"><div id="progressFill"></div></div>
        <p id="feedback">Ready!</p>
        <button onclick="setRandomWord()" style="background: #f1c40f; color: #2c3e50;">🎲 Random Word</button>
    </div>

    <audio id="tacoSound" src="https://actions.google.com/sounds/v1/impacts/crash_metal.ogg"></audio>

    <script>
        let currentWord = "Hello", currentStreak = 0;
        const wordBank = ["Schedule", "Library", "Phenomenon", "Rural", "Sixth", "February", "Specific"];
        
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const recognition = new SpeechRecognition();

        function getFemaleAussieVoice() {
            const voices = window.speechSynthesis.getVoices();
            return voices.find(v => v.lang.includes('en-AU') && (v.name.includes('Female') || v.name.includes('Karen') || v.name.includes('Catherine')));
        }

        function speakWord() {
            const msg = new SpeechSynthesisUtterance(currentWord);
            const voice = getFemaleAussieVoice();
            if (voice) msg.voice = voice;
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function setCustomWord() {
            const input = document.getElementById('userWordInput');
            if (input.value.trim() !== "") {
                currentWord = input.value.trim();
                document.getElementById('wordDisplay').innerText = currentWord;
                input.value = "";
                document.getElementById('progressFill').style.width = "0%";
            }
        }

        function startListening() { 
            recognition.start();
            document.getElementById('feedback').innerText = "Listening... 🎤";
        }

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase();
            const isCorrect = transcript.includes(currentWord.toLowerCase());
            updateUI(transcript, isCorrect);
        };

        function updateUI(transcript, isCorrect) {
            const score = isCorrect ? 100 : 0;
            document.getElementById('scoreDisplay').innerText = score + "%";
            document.getElementById('progressFill').style.width = score + "%";

            if (isCorrect) {
                document.getElementById('tacoSound').play();
                currentStreak++;
                setTimeout(setRandomWord, 1000);
            } else {
                currentStreak = 0;
                document.getElementById('feedback').innerText = "I heard: " + transcript;
            }
            document.getElementById('streakDisplay').innerText = currentStreak;
            
            const log = document.getElementById('historyLog');
            const entry = document.createElement('div');
            entry.className = 'history-item';
            entry.innerHTML = `<b>${currentWord}</b>: ${score}%`;
            log.prepend(entry);
        }

        function setRandomWord() {
            currentWord = wordBank[Math.floor(Math.random() * wordBank.length)];
            document.getElementById('wordDisplay').innerText = currentWord;
            document.getElementById('progressFill').style.width = "0%";
            document.getElementById('feedback').innerText = "Ready!";
        }

        window.speechSynthesis.onvoiceschanged = getFemaleAussieVoice;
    </script>
</body>
</html>
