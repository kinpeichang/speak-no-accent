<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accent Master v12</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; height: 100vh; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white; overflow: hidden;
        }
        .sidebar { 
            width: 280px; background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px; display: flex; flex-direction: column; gap: 20px; 
        }
        .stat-box { 
            background: rgba(255, 255, 255, 0.05); padding: 15px; 
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stat-number { font-size: 1.8rem; font-weight: bold; color: #3498db; }
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #wordDisplay { font-size: 4rem; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        button { padding: 12px 25px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.2s; margin: 5px; }
        #recordBtn { background: #e74c3c; color: white; }
        #progressBar { width: 100%; max-width: 500px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; margin: 30px 0; overflow: hidden; }
        #progressFill { width: 0%; height: 100%; transition: width 0.3s ease; }
        .history-item { background: rgba(255,255,255,0.1); padding: 8px; margin-top: 5px; border-radius: 5px; font-size: 0.85rem; }
        input { padding: 10px; border-radius: 20px; border: 1px solid #ccc; width: 180px; color: #333; outline: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Progress 🏆</h2>
        <div class="stat-box"><div>Current Streak</div><div id="streakDisplay" class="stat-number">0 ⚡</div></div>
        <div class="stat-box"><div>Last Score</div><div id="scoreDisplay" class="stat-number">0%</div></div>
        <div style="flex:1; overflow-y:auto;">
            <strong>Try History 📜</strong>
            <div id="historyLog"></div>
        </div>
    </div>

    <div class="main-content">
        <h1 id="wordDisplay">Hello</h1>
        <div>
            <button onclick="speakWord()" style="background: #3498db; color: white;">🔊 Listen</button>
            <button id="recordBtn" onclick="startListening()">🎤 Record</button>
        </div>
        <div id="progressBar"><div id="progressFill"></div></div>
        <p id="feedback">Ready!</p>
        
        <div style="margin: 20px 0; display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <label>Speed: <input type="range" id="speedSlider" min="0.1" max="1" step="0.1" value="0.9"></label>
            
            <div style="display: flex; gap: 10px;">
                <input type="text" id="userWordInput" placeholder="Enter custom word...">
                <button onclick="setCustomWord()" style="background: white; color: #1e3c72; padding: 10px 20px;">Set Word</button>
            </div>
            
            <button onclick="setRandomWord()" style="background: #f1c40f; color: #2c3e50;">🎲 Random Word</button>
        </div>
    </div>

    <audio id="tacoSound" src="https://actions.google.com/sounds/v1/impacts/crash_metal.ogg"></audio>
    <audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/clink_glasses.ogg"></audio>

    <script>
        let currentWord = "Hello", currentStreak = 0, attemptCount = 0;
        const wordBank = ["Schedule", "Library", "Phenomenon", "Rural", "Sixth", "February", "Specific"];
        const recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();

        function getAussieVoice() {
            const voices = window.speechSynthesis.getVoices();
            return voices.find(v => v.lang === 'en-AU' || v.name.includes("Australia"));
        }

        function speakWord() {
            const msg = new SpeechSynthesisUtterance(currentWord);
            const voice = getAussieVoice();
            if (voice) msg.voice = voice;
            msg.rate = (attemptCount >= 4) ? 0.5 : document.getElementById('speedSlider').value;
            window.speechSynthesis.speak(msg);
        }

        function setCustomWord() {
            const input = document.getElementById('userWordInput');
            const newWord = input.value.trim();
            if (newWord !== "") {
                currentWord = newWord;
                document.getElementById('wordDisplay').innerText = currentWord;
                document.getElementById('progressFill').style.width = "0%";
                document.getElementById('feedback').innerText = "Custom word ready! ⌨️";
                attemptCount = 0;
                input.value = "";
            }
        }

        function startListening() { recognition.start(); }

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase();
            const score = (transcript === currentWord.toLowerCase()) ? 1.0 : 0.5;
            updateUI(transcript, score);
        };

        function updateUI(transcript, score) {
            const percentage = Math.round(score * 100);
            const fill = document.getElementById('progressFill');
            
            document.getElementById('scoreDisplay').innerText = percentage + "%";
            fill.style.width = percentage + "%";

            if (percentage >= 80) {
                currentStreak++;
                attemptCount = 0;
                
                // 🔔 Trigger the specific sounds
                if (percentage === 100) {
                    document.getElementById('tacoSound').play(); // The Bong!
                    document.getElementById('feedback').innerText = "PERFECT! 🌮🔔";
                } else {
                    document.getElementById('successSound').play();
                    document.getElementById('feedback').innerText = "Great job! 👍";
                }
                
                setTimeout(setRandomWord, 800);
            } else {
                currentStreak = 0;
                attemptCount++;
                document.getElementById('feedback').innerText = "Try again! 🔄";
            }

            document.getElementById('streakDisplay').innerText = `${currentStreak} ⚡`;

            const log = document.getElementById('historyLog');
            const entry = document.createElement('div');
            entry.className = 'history-item';
            entry.innerHTML = `<b>${currentWord}</b>: ${percentage}%`;
            log.prepend(entry);
            if (log.children.length > 10) log.removeChild(log.lastElementChild);
        }

        function setRandomWord() {
            currentWord = wordBank[Math.floor(Math.random() * wordBank.length)];
            document.getElementById('wordDisplay').innerText = currentWord;
            document.getElementById('progressFill').style.width = "0%";
        }

        window.speechSynthesis.onvoiceschanged = () => { getAussieVoice(); };
    </script>
</body>
</html>
