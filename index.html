<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accent Master</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;overflow:hidden}
.app{display:flex;height:100vh;min-height:600px;background:#f5f4f0;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:#fff;border-right:0.5px solid rgba(0,0,0,0.1);display:flex;flex-direction:column;padding:0;overflow:hidden}
.sidebar-header{padding:16px 16px 10px;border-bottom:0.5px solid rgba(0,0,0,0.1)}
.app-title{font-size:15px;font-weight:500;color:#1a1a1a}
.app-sub{font-size:11px;color:#888;margin-top:2px}
.stat-row{display:flex;gap:8px;padding:10px 16px;border-bottom:0.5px solid rgba(0,0,0,0.1)}
.stat-card{flex:1;background:#f5f4f0;border-radius:8px;padding:7px 10px}
.stat-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em}
.stat-val{font-size:19px;font-weight:500;color:#1a1a1a;margin-top:1px;line-height:1}
.stat-val.good{color:#1D9E75}
.section-title{font-size:10px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.06em;padding:10px 16px 4px}
.cat-btn{display:flex;align-items:center;gap:8px;padding:5px 16px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;color:#555;font-size:12px;font-family:inherit;transition:background .1s}
.cat-btn:hover{background:#f5f4f0}
.cat-btn.active{background:#f5f4f0;color:#1a1a1a;font-weight:500}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-count{margin-left:auto;font-size:10px;color:#aaa}
.history-list{flex:1;overflow-y:auto;padding:0 16px 12px}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);font-size:12px}
.hist-word{color:#1a1a1a}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:0;overflow:auto}
.word-area{text-align:center;margin-bottom:24px}
.word-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.word-display{font-size:3.2rem;font-weight:500;color:#1a1a1a;line-height:1;margin-bottom:5px}
.phonetic{font-size:13px;color:#888;font-style:italic}
.diff-row{display:flex;gap:6px;margin-bottom:14px}
.diff-btn{padding:4px 12px;font-size:11px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:transparent;cursor:pointer;color:#555;font-family:inherit}
.diff-btn.active{border-color:#1D9E75;color:#1D9E75;background:#E1F5EE}
.controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;font-family:inherit;transition:background .1s,transform .1s}
.btn:hover{background:#f5f4f0}
.btn:active{transform:scale(.97)}
.btn.danger{background:#E24B4A;border-color:#E24B4A;color:#fff}
.btn.danger:hover{background:#A32D2D}
.score-area{width:100%;max-width:420px;margin-bottom:16px}
.score-bar-bg{height:8px;background:#e8e6e0;border-radius:4px;overflow:hidden;margin-bottom:7px}
.score-bar-fill{height:100%;border-radius:4px;transition:width .4s ease,background .4s ease;width:0%}
.feedback{font-size:13px;color:#666;text-align:center;min-height:18px}
.feedback.success{color:#1D9E75;font-weight:500}
.feedback.fail{color:#E24B4A}
.bottom-row{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap;justify-content:center}
.bottom-row input[type=text]{padding:7px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;font-size:12px;font-family:inherit;outline:none;width:160px}
.speed-row{display:flex;align-items:center;gap:10px;font-size:12px;color:#666;margin-top:10px}
.speed-row input{width:100px}
.progress-label{font-size:11px;color:#888;margin-top:6px;text-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="app-title">Accent Master</div>
      <div class="app-sub">Australian English practice</div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">Streak</div><div class="stat-val" id="streakVal">0</div></div>
      <div class="stat-card"><div class="stat-label">Best</div><div class="stat-val good" id="bestVal">—</div></div>
    </div>
    <div class="section-title">Categories</div>
    <div style="overflow-y:auto;flex:0 0 auto;max-height:260px">
      <button class="cat-btn active" data-cat="all" onclick="selectCat(this)"><span class="cat-dot" style="background:#888780"></span>All words<span class="cat-count" id="cnt-all"></span></button>
      <button class="cat-btn" data-cat="tricky" onclick="selectCat(this)"><span class="cat-dot" style="background:#E24B4A"></span>Tricky sounds<span class="cat-count" id="cnt-tricky"></span></button>
      <button class="cat-btn" data-cat="business" onclick="selectCat(this)"><span class="cat-dot" style="background:#378ADD"></span>Business<span class="cat-count" id="cnt-business"></span></button>
      <button class="cat-btn" data-cat="finance" onclick="selectCat(this)"><span class="cat-dot" style="background:#1D9E75"></span>Finance<span class="cat-count" id="cnt-finance"></span></button>
      <button class="cat-btn" data-cat="tech" onclick="selectCat(this)"><span class="cat-dot" style="background:#7F77DD"></span>Tech / AI<span class="cat-count" id="cnt-tech"></span></button>
      <button class="cat-btn" data-cat="medical" onclick="selectCat(this)"><span class="cat-dot" style="background:#D85A30"></span>Medical<span class="cat-count" id="cnt-medical"></span></button>
      <button class="cat-btn" data-cat="everyday" onclick="selectCat(this)"><span class="cat-dot" style="background:#BA7517"></span>Everyday<span class="cat-count" id="cnt-everyday"></span></button>
      <button class="cat-btn" data-cat="numbers" onclick="selectCat(this)"><span class="cat-dot" style="background:#D4537E"></span>Numbers<span class="cat-count" id="cnt-numbers"></span></button>
    </div>
    <div class="section-title">Recent history</div>
    <div class="history-list" id="historyList"></div>
  </div>
 
  <div class="main">
    <div class="word-area">
      <div class="word-label" id="catLabel">All words</div>
      <div class="word-display" id="wordDisplay">Schedule</div>
      <div class="phonetic" id="phoneticDisplay">SHED-yool</div>
    </div>
    <div class="diff-row">
      <button class="diff-btn active" data-diff="easy" onclick="setDiff(this)">Easy</button>
      <button class="diff-btn" data-diff="medium" onclick="setDiff(this)">Medium</button>
      <button class="diff-btn" data-diff="hard" onclick="setDiff(this)">Hard</button>
      <button class="diff-btn" data-diff="all" onclick="setDiff(this)">All</button>
    </div>
    <div class="controls">
      <button class="btn" onclick="speakWord()">Listen</button>
      <button class="btn" id="recordBtn" onclick="toggleRecord()">Record</button>
      <button class="btn" onclick="nextWord()">Next word</button>
    </div>
    <div class="score-area">
      <div class="score-bar-bg"><div class="score-bar-fill" id="scoreFill"></div></div>
      <div class="feedback" id="feedback">Press Listen to hear, then Record to practice</div>
    </div>
    <div class="progress-label" id="progressLabel"></div>
    <div class="speed-row">
      <span>Speed:</span>
      <input type="range" id="speedSlider" min="0.3" max="1" step="0.1" value="0.85">
      <span id="speedLabel">0.9</span>
    </div>
    <div class="bottom-row">
      <input type="text" id="customInput" placeholder="Enter any word...">
      <button class="btn" onclick="setCustom()">Practice it</button>
    </div>
  </div>
</div>

  const all=Object.values(words).flat();
  document.getElementById("cnt-all").textContent=all.length;
  Object.keys(words).forEach(k=>{const el=document.getElementById("cnt-"+k);if(el)el.textContent=words[k].length;});
}
 
function nextWord(){
  const pool=getPool();
  const idx=Math.floor(Math.random()*pool.length);
  currentWordObj=pool[idx];
  document.getElementById("wordDisplay").textContent=currentWordObj.w;
  document.getElementById("phoneticDisplay").textContent=currentWordObj.p;
  document.getElementById("scoreFill").style.width="0%";
  document.getElementById("feedback").textContent="Press Listen, then Record";
  document.getElementById("feedback").className="feedback";
  updateProgress();
}
 
function speakWord(){
  window.speechSynthesis.cancel();
  const voices=window.speechSynthesis.getVoices();
  const au=voices.find(v=>v.lang.includes("en-AU")||v.name.toLowerCase().includes("australia"))||voices.find(v=>v.lang.startsWith("en"));
  const msg=new SpeechSynthesisUtterance(currentWordObj.w);
  if(au)msg.voice=au;
  msg.rate=parseFloat(document.getElementById("speedSlider").value);
  window.speechSynthesis.speak(msg);
}
 
const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang="en-AU";
 
function toggleRecord(){
  if(isRecording){recognition.stop();return;}
  recognition.start();isRecording=true;
  document.getElementById("recordBtn").textContent="Stop";
  document.getElementById("recordBtn").classList.add("danger");
  document.getElementById("feedback").textContent="Listening...";
  document.getElementById("feedback").className="feedback";
}
 
recognition.onresult=e=>{
  const heard=e.results[0][0].transcript.toLowerCase().trim();
  const target=currentWordObj.w.toLowerCase();
  let score=0;
  if(heard===target)score=1.0;
  else if(heard.includes(target))score=0.88;
  else{
    const hl=heard.length,tl=target.length;let m=0;
    for(let i=0;i<Math.min(hl,tl);i++)if(heard[i]===target[i])m++;
    score=Math.max(0,m/Math.max(hl,tl)-0.1);
    if([...target].every(c=>heard.includes(c)))score=Math.max(score,0.6);
    if(heard.split(" ").some(w=>w===target))score=Math.max(score,0.9);
  }
  const pct=Math.round(score*100);
  sessionCount++;if(pct>=80)sessionCorrect++;
  showResult(heard,pct);
};
 
recognition.onend=()=>{isRecording=false;document.getElementById("recordBtn").textContent="Record";document.getElementById("recordBtn").classList.remove("danger");};
recognition.onerror=()=>{isRecording=false;document.getElementById("recordBtn").textContent="Record";document.getElementById("recordBtn").classList.remove("danger");document.getElementById("feedback").textContent="Mic error — check browser permissions";};
 
function showResult(heard,pct){
  const fill=document.getElementById("scoreFill");
  fill.style.width=pct+"%";
  fill.style.background=pct>=80?"#1D9E75":pct>=50?"#BA7517":"#E24B4A";
  const fb=document.getElementById("feedback");
  if(pct>=80){
    fb.textContent=pct===100?"Perfect!":"Great — "+pct+"% match";
    fb.className="feedback success";streak++;
    if(streak>bestStreak){bestStreak=streak;document.getElementById("bestVal").textContent=bestStreak;}
    setTimeout(nextWord,1300);
  } else {
    fb.textContent='I heard "'+heard+'" — try again ('+pct+"%)";
    fb.className="feedback fail";streak=0;
  }
  document.getElementById("streakVal").textContent=streak;
  addHistory(currentWordObj.w,pct);updateProgress();
}
 
function addHistory(word,pct){
  history.unshift({word,pct});if(history.length>15)history.pop();
  document.getElementById("historyList").innerHTML=history.map(h=>`<div class="hist-item"><span class="hist-word">${h.word}</span><span style="font-weight:500;font-size:12px;color:${h.pct>=80?"#1D9E75":h.pct>=50?"#BA7517":"#E24B4A"}">${h.pct}%</span></div>`).join("");
}
 
function updateProgress(){
  if(sessionCount===0){document.getElementById("progressLabel").textContent="";return;}
  const acc=Math.round(sessionCorrect/sessionCount*100);
  document.getElementById("progressLabel").textContent="Session: "+sessionCorrect+"/"+sessionCount+" correct ("+acc+"% accuracy)";
}
 
function selectCat(btn){
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");currentCat=btn.dataset.cat;
  document.getElementById("catLabel").textContent=catLabels[currentCat]||"All words";
  nextWord();
}
 
function setDiff(btn){
  document.querySelectorAll(".diff-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");currentDiff=btn.dataset.diff;nextWord();
}
 
function setCustom(){
  const v=document.getElementById("customInput").value.trim();if(!v)return;
  currentWordObj={w:v,p:"(custom)"};
  document.getElementById("wordDisplay").textContent=v;
  document.getElementById("phoneticDisplay").textContent="(custom)";
  document.getElementById("customInput").value="";
  document.getElementById("scoreFill").style.width="0%";
  document.getElementById("feedback").textContent="Press Listen, then Record";
  document.getElementById("feedback").className="feedback";
}
 
document.getElementById("speedSlider").addEventListener("input",function(){
  document.getElementById("speedLabel").textContent=parseFloat(this.value).toFixed(1);
});
 
window.speechSynthesis.onvoiceschanged=()=>{};
updateCounts();nextWord();
</script>
</body>
</html>
