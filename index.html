<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Accent Master">
<title>Accent Master</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;min-height:-webkit-fill-available}
html{height:-webkit-fill-available}
.top-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.12);padding:12px 16px 8px;padding-top:calc(12px + env(safe-area-inset-top))}
.top-nav-inner{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:17px;font-weight:600;color:#1a1a1a}
.app-sub{font-size:11px;color:#888}
.stat-pills{display:flex;gap:8px}
.stat-pill{background:#f5f4f0;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;color:#1a1a1a}
.stat-pill span{color:#1D9E75}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:0.5px solid rgba(0,0,0,0.12);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;cursor:pointer;border:none;background:transparent;font-family:inherit;color:#888;font-size:10px;gap:3px;transition:color .15s}
.nav-tab.active{color:#1D9E75}
.nav-icon{font-size:20px;line-height:1}
.screen{display:none;position:fixed;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:block}
.screen-content{padding-top:calc(64px + env(safe-area-inset-top));padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.practice-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 16px;gap:0}
.word-card{background:#fff;border-radius:20px;width:100%;padding:28px 20px;text-align:center;margin-bottom:16px;border:0.5px solid rgba(0,0,0,0.08)}
.word-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.word-display{font-size:2.6rem;font-weight:600;color:#1a1a1a;line-height:1.1;margin-bottom:8px;word-break:break-word}
.phonetic{font-size:14px;color:#888;font-style:italic}
.score-card{background:#fff;border-radius:16px;width:100%;padding:16px 20px;margin-bottom:14px;border:0.5px solid rgba(0,0,0,0.08)}
.score-bar-bg{height:10px;background:#f0ede8;border-radius:5px;overflow:hidden;margin-bottom:8px}
.score-bar-fill{height:100%;border-radius:5px;transition:width .4s ease,background .4s ease;width:0%}
.feedback{font-size:14px;color:#666;text-align:center;min-height:20px;line-height:1.4}
.feedback.success{color:#1D9E75;font-weight:500}
.feedback.fail{color:#E24B4A}
.btn-row{display:flex;gap:10px;width:100%;margin-bottom:12px}
.btn{flex:1;padding:14px 8px;border-radius:14px;font-size:14px;font-weight:500;cursor:pointer;border:0.5px solid rgba(0,0,0,0.15);background:#fff;color:#1a1a1a;font-family:inherit;transition:background .1s,transform .1s;text-align:center}
.btn:active{transform:scale(.96)}
.btn.primary{background:#1D9E75;border-color:#1D9E75;color:#fff}
.btn.danger{background:#E24B4A;border-color:#E24B4A;color:#fff}
.btn.secondary{background:#f5f4f0;border-color:transparent}
.diff-row{display:flex;gap:6px;margin-bottom:14px;width:100%}
.diff-btn{flex:1;padding:8px 4px;font-size:12px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;cursor:pointer;color:#666;font-family:inherit;text-align:center}
.diff-btn.active{border-color:#1D9E75;color:#1D9E75;background:#E1F5EE;font-weight:500}
.custom-row{display:flex;gap:8px;width:100%;margin-top:4px}
.custom-row input{flex:1;padding:12px 14px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;color:#1a1a1a;font-size:15px;font-family:inherit;outline:none}
.custom-row input:focus{border-color:#1D9E75}
.speed-row{display:flex;align-items:center;gap:12px;font-size:13px;color:#666;width:100%;margin-top:12px}
.speed-row input[type=range]{flex:1;accent-color:#1D9E75}
.progress-note{font-size:12px;color:#aaa;margin-top:8px;text-align:center;width:100%}
.section-pad{padding:16px}
.section-head{font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.cat-card{background:#fff;border-radius:14px;padding:16px;cursor:pointer;border:1.5px solid transparent;transition:border-color .15s}
.cat-card.active{border-color:#1D9E75}
.cat-card-dot{width:10px;height:10px;border-radius:50%;margin-bottom:8px}
.cat-card-name{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:2px}
.cat-card-count{font-size:12px;color:#888}
.hist-list{padding:16px}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#fff;border-radius:12px;margin-bottom:8px}
.hist-word{font-size:15px;color:#1a1a1a;font-weight:500}
.hist-score{font-size:14px;font-weight:500}
.empty-state{text-align:center;padding:60px 20px;color:#aaa;font-size:15px}
</style>
</head>
<body>

<div class="top-nav">
  <div class="top-nav-inner">
    <div>
      <div class="app-title">Accent Master</div>
      <div class="app-sub">Australian English practice</div>
    </div>
    <div class="stat-pills">
      <div class="stat-pill">🔥 <span id="streakVal">0</span></div>
      <div class="stat-pill">⭐ <span id="bestVal">0</span></div>
    </div>
  </div>
</div>

<div class="screen active" id="screen-practice">
  <div class="screen-content">
    <div class="practice-wrap">
      <div class="word-card">
        <div class="word-label" id="catLabel">All words</div>
        <div class="word-display" id="wordDisplay">Schedule</div>
        <div class="phonetic" id="phoneticDisplay">SHED-yool</div>
      </div>
      <div class="diff-row">
        <button class="diff-btn active" data-diff="easy" onclick="setDiff(this)">Easy</button>
        <button class="diff-btn" data-diff="medium" onclick="setDiff(this)">Medium</button>
        <button class="diff-btn" data-diff="hard" onclick="setDiff(this)">Hard</button>
        <button class="diff-btn" data-diff="all" onclick="setDiff(this)">All</button>
      </div>
      <div class="btn-row">
        <button class="btn secondary" onclick="speakWord()">🔊 Listen</button>
        <button class="btn" id="recordBtn" onclick="toggleRecord()">🎤 Record</button>
        <button class="btn secondary" onclick="nextWord()">Next</button>
      </div>
      <div class="score-card">
        <div class="score-bar-bg"><div class="score-bar-fill" id="scoreFill"></div></div>
        <div class="feedback" id="feedback">Tap Listen, then Record to practice</div>
      </div>
      <div class="progress-note" id="progressLabel"></div>
      <div class="speed-row">
        <span>Speed</span>
        <input type="range" id="speedSlider" min="0.3" max="1" step="0.1" value="0.85">
        <span id="speedLabel">0.9</span>
      </div>
      <div class="custom-row" style="margin-top:16px">
        <input type="text" id="customInput" placeholder="Enter any word...">
        <button class="btn primary" style="flex:0 0 auto;padding:12px 16px" onclick="setCustom()">Go</button>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="screen-categories">
  <div class="screen-content">
    <div class="section-pad">
      <div class="section-head">Choose a category</div>
      <div class="cat-grid" id="catGrid"></div>
    </div>
  </div>
</div>

<div class="screen" id="screen-history">
  <div class="screen-content">
    <div class="hist-list" id="histList">
      <div class="empty-state">No attempts yet. Start practicing!</div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-tab active" onclick="showScreen('practice',this)">
    <div class="nav-icon">🎤</div>Practice
  </button>
  <button class="nav-tab" onclick="showScreen('categories',this)">
    <div class="nav-icon">📚</div>Categories
  </button>
  <button class="nav-tab" onclick="showScreen('history',this)">
    <div class="nav-icon">📊</div>History
  </button>
</div>

};

const catMeta={
  all:{label:"All words",color:"#888780"},
  tricky:{label:"Tricky sounds",color:"#E24B4A"},
  business:{label:"Business",color:"#378ADD"},
  finance:{label:"Finance",color:"#1D9E75"},
  tech:{label:"Tech / AI",color:"#7F77DD"},
  medical:{label:"Medical",color:"#D85A30"},
  everyday:{label:"Everyday",color:"#BA7517"},
  numbers:{label:"Numbers",color:"#D4537E"}
};

let currentCat="all",currentDiff="easy",currentWordObj={w:"Schedule",p:"SHED-yool"},streak=0,bestStreak=0,history=[],isRecording=false,sessionCount=0,sessionCorrect=0;

function getPool(){
  const diffCats={easy:["everyday","numbers"],medium:["business","finance","everyday","tricky"],hard:["tricky","business","finance","tech","medical"],all:Object.keys(words)};
  const cats=currentDiff==="all"?Object.keys(words):diffCats[currentDiff];
  if(currentCat==="all")return cats.flatMap(c=>words[c]);
  return words[currentCat]||[];
}

function nextWord(){
  const pool=getPool();
  currentWordObj=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById("wordDisplay").textContent=currentWordObj.w;
  document.getElementById("phoneticDisplay").textContent=currentWordObj.p;
  document.getElementById("scoreFill").style.width="0%";
  document.getElementById("feedback").textContent="Tap Listen, then Record to practice";
  document.getElementById("feedback").className="feedback";
  updateProgress();
}

function speakWord(){
  window.speechSynthesis.cancel();
  const voices=window.speechSynthesis.getVoices();
  const au=voices.find(v=>v.lang.includes("en-AU")||v.name.toLowerCase().includes("australia"))||voices.find(v=>v.lang.startsWith("en"));
  const msg=new SpeechSynthesisUtterance(currentWordObj.w);
  if(au)msg.voice=au;
  msg.rate=parseFloat(document.getElementById("speedSlider").value);
  window.speechSynthesis.speak(msg);
}

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang="en-AU";

function toggleRecord(){
  if(isRecording){recognition.stop();return;}
  try{recognition.start();}catch(e){return;}
  isRecording=true;
  const btn=document.getElementById("recordBtn");
  btn.textContent="⏹ Stop";btn.classList.add("danger");
  document.getElementById("feedback").textContent="Listening...";
  document.getElementById("feedback").className="feedback";
}

recognition.onresult=e=>{
  const heard=e.results[0][0].transcript.toLowerCase().trim();
  const target=currentWordObj.w.toLowerCase();
  let score=0;
  if(heard===target)score=1.0;
  else if(heard.includes(target))score=0.88;
  else{
    let m=0;
    for(let i=0;i<Math.min(heard.length,target.length);i++)if(heard[i]===target[i])m++;
    score=Math.max(0,m/Math.max(heard.length,target.length)-0.1);
    if([...target].every(c=>heard.includes(c)))score=Math.max(score,0.6);
    if(heard.split(" ").some(w=>w===target))score=Math.max(score,0.9);
  }
  const pct=Math.round(score*100);
  sessionCount++;if(pct>=80)sessionCorrect++;
  showResult(heard,pct);
};

recognition.onend=()=>{
  isRecording=false;
  const btn=document.getElementById("recordBtn");
  btn.textContent="🎤 Record";btn.classList.remove("danger");
};
recognition.onerror=()=>{
  isRecording=false;
  const btn=document.getElementById("recordBtn");
  btn.textContent="🎤 Record";btn.classList.remove("danger");
  document.getElementById("feedback").textContent="Mic error — check Safari permissions";
};

function showResult(heard,pct){
  const fill=document.getElementById("scoreFill");
  fill.style.width=pct+"%";
  fill.style.background=pct>=80?"#1D9E75":pct>=50?"#BA7517":"#E24B4A";
  const fb=document.getElementById("feedback");
  if(pct>=80){
    fb.textContent=pct===100?"Perfect!":"Great — "+pct+"% match";
    fb.className="feedback success";
    streak++;
    if(streak>bestStreak){bestStreak=streak;document.getElementById("bestVal").textContent=bestStreak;}
    setTimeout(nextWord,1300);
  } else {
    fb.textContent='Heard "'+heard+'" — try again ('+pct+"%)";
    fb.className="feedback fail";streak=0;
  }
  document.getElementById("streakVal").textContent=streak;
  addHistory(currentWordObj.w,pct);
  updateProgress();
}

function addHistory(word,pct){
  history.unshift({word,pct});
  if(history.length>30)history.pop();
  renderHistory();
}

function renderHistory(){
  const el=document.getElementById("histList");
  if(history.length===0){el.innerHTML='<div class="empty-state">No attempts yet. Start practicing!</div>';return;}
  el.innerHTML=history.map(h=>`<div class="hist-item"><span class="hist-word">${h.word}</span><span class="hist-score" style="color:${h.pct>=80?"#1D9E75":h.pct>=50?"#BA7517":"#E24B4A"}">${h.pct}%</span></div>`).join("");
}

function updateProgress(){
  if(sessionCount===0){document.getElementById("progressLabel").textContent="";return;}
  const acc=Math.round(sessionCorrect/sessionCount*100);
  document.getElementById("progressLabel").textContent="Session: "+sessionCorrect+"/"+sessionCount+" correct · "+acc+"% accuracy";
}

function setDiff(btn){
  document.querySelectorAll(".diff-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");currentDiff=btn.dataset.diff;nextWord();
}

function setCustom(){
  const v=document.getElementById("customInput").value.trim();if(!v)return;
  currentWordObj={w:v,p:"(custom)"};
  document.getElementById("wordDisplay").textContent=v;
  document.getElementById("phoneticDisplay").textContent="(custom)";
  document.getElementById("customInput").value="";
  document.getElementById("scoreFill").style.width="0%";
  document.getElementById("feedback").textContent="Tap Listen, then Record";
  document.getElementById("feedback").className="feedback";
  showScreen("practice",document.querySelectorAll(".nav-tab")[0]);
}

function buildCatGrid(){
  const grid=document.getElementById("catGrid");
  const allCount=Object.values(words).flat().length;
  const cats=[{key:"all",count:allCount},...Object.keys(words).map(k=>({key:k,count:words[k].length}))];
  grid.innerHTML=cats.map(c=>`
    <div class="cat-card${currentCat===c.key?" active":""}" onclick="selectCat('${c.key}',this)">
      <div class="cat-card-dot" style="background:${catMeta[c.key]?.color||"#888"}"></div>
      <div class="cat-card-name">${catMeta[c.key]?.label||c.key}</div>
      <div class="cat-card-count">${c.count} words</div>
    </div>`).join("");
}

function selectCat(key){
  currentCat=key;
  document.getElementById("catLabel").textContent=catMeta[key]?.label||"All words";
  nextWord();
  setTimeout(()=>showScreen("practice",document.querySelectorAll(".nav-tab")[0]),200);
}

function showScreen(name,tab){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("screen-"+name).classList.add("active");
  if(tab)tab.classList.add("active");
  if(name==="categories")buildCatGrid();
  if(name==="history")renderHistory();
}

document.getElementById("speedSlider").addEventListener("input",function(){
  document.getElementById("speedLabel").textContent=parseFloat(this.value).toFixed(1);
});

window.speechSynthesis.onvoiceschanged=()=>{};
nextWord();
</script>
</body>
</html>
